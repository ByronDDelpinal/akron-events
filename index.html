<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Pre-CSS background: until the (render-blocking) CSS bundle
         arrives, the browser paints its default white — a hard flash
         against the page that follows. This zero-network rule makes
         the blank window brand cream instead. Matches --bg-page in
         globals.css (default theme); the boot script below overrides
         it per stored theme before first paint. -->
    <style>html { background: #FCFAF4; }</style>
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Akron Pulse — discover what's happening in Akron, OH and Summit County. Concerts, art shows, community gatherings, fundraisers, and more, all in one place." />
    <!-- theme-color is used by Discord for the colored stripe on link
         previews and by mobile browsers to tint the URL bar. The
         value matches --amber in src/styles/globals.css, the
         brand teal. Update both places together if the palette
         shifts. -->
    <meta name="theme-color" content="#0E5163" />
    <!-- iOS "Add to Home Screen" polish. display:standalone in the manifest
         drives launch behavior on modern iOS; these Apple-specific tags add
         the home-screen title and a translucent status bar so the teal
         header runs edge to edge (the header reserves env(safe-area-inset-top)
         in Header.css). apple-mobile-web-app-capable is also what lets the
         apple-touch-startup-image splash links below take effect. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Akron Pulse" />
    <!-- iOS launch images (portrait). Generated by scripts/generate-ios-splash.js
         — re-run `npm run gen:ios-splash` after changing the icon or adding a
         device. Without a media match iOS shows a blank launch, never breakage. -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-750-1334.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1242-2208.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1125-2436.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-828-1792.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1242-2688.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1170-2532.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1179-2556.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1284-2778.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1290-2796.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-1536-2048.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-1640-2360.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1112px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-1668-2224.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-1668-2388.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-2048-2732.png" />
    <!-- RSS feed discovery. Most readers (NetNewsWire, Feedly,
         Inoreader, Substack imports, news aggregators) scan for
         this <link> tag on the homepage to find the feed URL. -->
    <link rel="alternate" type="application/rss+xml" title="Akron Pulse — Upcoming Events" href="/feed.xml" />
    <title>Akron Pulse — Akron & Summit County Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Warm the Supabase connection (DNS + TCP + TLS) while the JS
         bundle is still downloading — the first events query otherwise
         pays the full handshake after React mounts. The injectSupabase-
         Preconnect plugin in vite.config.js replaces the placeholder
         below with a <link rel="preconnect"> to the resolved Supabase
         origin at build time, or with nothing when VITE_SUPABASE_URL is
         unset (e.g. CI). Don't restore the raw %ENV% token here: an
         unsubstituted value is a malformed URI that crashes the PWA
         plugin's decodeURI pass. -->
    <!-- supabase-preconnect -->
    <!-- Preload the hero poster so it can be the LCP element on cold
         loads of the homepage. The video that fades in over it is
         lazy-attached after the first events page lands (see
         HomePage.jsx) so the video network fetch does not contend
         with the LCP image. -->
    <link rel="preload" as="image" href="/video/akron-pulse-banner-poster.jpg" fetchpriority="high" />
    <!--
      Theme-aware Google Fonts. The id="theme-fonts" link is the single
      stylesheet element the lazy loader (hooks/useTheme.jsx) updates
      whenever the user picks a new theme. The default href below
      matches the akron-pulse theme so cold-load first paint uses the
      correct families — the inline boot script (below) rewrites this
      href before React mounts if a non-default theme is stored.
    -->
    <!-- media="print" + onload swap makes the stylesheet non-render-
         blocking: first paint uses fallback system fonts (every theme
         URL has display=swap) and the web fonts swap in when ready.
         Lighthouse flagged the blocking css2 request + its woff2 chain
         as the largest render-blocking cost on mobile. The onload
         attribute survives href rewrites by the theme switcher, so
         later theme loads stay non-blocking too. -->
    <link
      id="theme-fonts"
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700&family=Inter:wght@400;500;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700&family=Inter:wght@400;500;700&display=swap"
      />
    </noscript>
    <script>
      // Apply the user's theme class AND swap the font stylesheet
      // before React mounts, to avoid a flash of the default palette
      // or default fonts on cold loads. Storage key must match
      // THEME_STORAGE_KEY in src/lib/themes.js; React re-validates the
      // value on mount, so any invalid class here is harmless.
      // Handles the rebrand migration from 'turnout.theme' too.
      //
      // The font href map is duplicated from THEME_FONTS in
      // src/lib/themes.js because this script runs pre-bundle. Keep
      // them in sync — if a theme is added, add it here too. (The CSS
      // class still applies even if the font href is missing, so the
      // worst case for a forgotten entry is fallback fonts.)
      (function () {
        // Per-theme --bg-page values, duplicated from src/styles/themes.css
        // for the same reason as FONT_HREFS below: this runs pre-bundle.
        // Keeps the pre-CSS background flash-free for non-default themes
        // too. Worst case for a missing entry is the default cream from
        // the inline <style> above — close enough for every light theme.
        var THEME_BGS = {
          'civic-classic': '#FAF6EF',
          'grand-piano':   '#FAFAF8',
          'pulse-red':     '#FBF8F2',
          'twilight-plum': '#FBF8F2',
          'forest-amber':  '#FAF6EC',
          'harbor-civic':  '#F2EEE8',
          'violet-hour':   '#F3EEF0',
          'boardwalk':     '#FAF2E8',
          'olive-grove':   '#F5EEDA',
          'arcade-night':  '#FDF2F8',
          'stargazer':     '#F5F2F7',
          'prime-time':    '#F9F4EC',
          'postcard':      '#F4FBFC',
        };
        var FONT_HREFS = {
          'civic-classic':  'https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Lato:wght@400;700&display=swap',
          'grand-piano':    'https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,700&family=Source+Sans+3:wght@400;500;700&display=swap',
          'pulse-red':      'https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;700&display=swap',
          'twilight-plum':  'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Spectral:wght@400;500;700&display=swap',
          'forest-amber':   'https://fonts.googleapis.com/css2?family=Domine:wght@500;700&family=Lato:wght@400;700&display=swap',
          'harbor-civic':   'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;700&display=swap',
          'violet-hour':    'https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;700&display=swap',
          'boardwalk':      'https://fonts.googleapis.com/css2?family=Recursive:wght,CASL@500,1;700,1&family=Inter:wght@400;500;700&display=swap',
          'olive-grove':    'https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Karla:wght@400;500;700&display=swap',
          'arcade-night':   'https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap',
          'stargazer':      'https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,500,100;9..144,700,100&family=Inter:wght@400;500;700&display=swap',
          'prime-time':     'https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Archivo:wght@400;500;700&display=swap',
        };
        try {
          // Inside the white-label embed (/embed/*) the theme is fixed by
          // the ?theme= param, never localStorage, so the partner's choice
          // paints correctly on cold load with no flash of the default.
          var isEmbed = location.pathname.indexOf('/embed') === 0;
          var t = isEmbed
            ? new URLSearchParams(location.search).get('theme')
            : (localStorage.getItem('akronpulse.theme')
               || localStorage.getItem('turnout.theme'));
          if (t && /^[a-z-]+$/.test(t) && t !== 'akron-pulse') {
            document.documentElement.classList.add('theme-' + t);
            var bg = THEME_BGS[t];
            if (bg) document.documentElement.style.background = bg;
            var href = FONT_HREFS[t];
            if (href) {
              var link = document.getElementById('theme-fonts');
              if (link) link.setAttribute('href', href);
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- boot-shell:start -->
      <!-- ── Boot shell ─────────────────────────────────────────────
           Static copy of the header + homepage hero, painted as soon
           as the (render-blocking) CSS bundle arrives instead of
           after React mounts. This is what fixes FCP/LCP on mobile:
           the LCP element is the hero poster, and without this shell
           its "element render delay" was ~2s of JS boot time.

           PRODUCTION ONLY: the stripBootShellInDev plugin in
           vite.config.js removes everything between the
           boot-shell:start/end marker comments during `vite dev`,
           where CSS arrives via JS modules and the shell would flash
           unstyled. Don't remove the markers.

           Rules for editing:
           - Markup MUST mirror the hero in src/pages/HomePage.tsx and
             the header in src/components/Header.tsx (same classes,
             same copy) so the React mount repaints identically with
             no visual flash. If you change either component, change
             this shell too.
           - All styles come from the bundled CSS via the shared class
             names. Do not add inline styles here.
           - createRoot().render() replaces this subtree on mount; the
             inline script right after #root removes it pre-paint on
             any non-home path (event pages, /embed, /admin, …).      -->
      <div id="boot-shell">
        <header class="site-header">
          <div class="header-inner">
            <a href="/" class="nav-logo">
              <img
                src="/theme-logos/AkronPulse_Civic-Teal.png"
                alt=""
                class="nav-logo-img"
                aria-hidden="true"
              />
              Akron <span class="amber">Pulse</span>
            </a>
          </div>
        </header>
        <main>
          <div class="hero">
            <div class="hero-bg" aria-hidden="true">
              <div class="hero-bg-poster"></div>
              <div class="hero-bg-scrim"></div>
            </div>
            <div class="hero-glow"></div>
            <p class="hero-eyebrow">Summit County, Ohio</p>
            <h1>What's happening<br />in <span>Akron?</span></h1>
            <p class="hero-sub">Concerts, galas, art shows, markets, and more — happening right now in Akron.</p>
            <div class="search-wrap">
              <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input class="search-input" type="text" placeholder="Search events, venues, organizers…" />
            </div>
          </div>
        </main>
      </div>
      <!-- boot-shell:end -->
    </div>
    <script>
      // Boot-shell gating, runs before first paint:
      // (no-ops in dev, where the plugin strips the shell entirely)
      //  - non-home paths get no shell (they'd flash the wrong page)
      //  - non-default themes hide the (default) logo image rather than
      //    show the wrong one; React mounts the correct logo moments later
      (function () {
        try {
          var shell = document.getElementById('boot-shell')
          if (!shell) return
          if (location.pathname !== '/') { shell.remove(); return }
          var t = localStorage.getItem('akronpulse.theme')
          if (t && t !== 'akron-pulse') {
            var logo = shell.querySelector('.nav-logo-img')
            if (logo) logo.style.visibility = 'hidden'
          }
        } catch (e) {}
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
