# CI — runs on every PR and every push to main.
#
# Four gates, in fail-fast order (cheapest first):
#   1. lint       — ESLint over scripts/ (Node scrapers + tooling)
#   2. lint:src   — ESLint over src/ (React + TypeScript)
#   3. typecheck  — tsc --noEmit
#   4. test       — node --test scripts/tests/ (1,200+ assertions, fixture-based, no network)
#   5. build      — vite build (catches import/bundling breakage tsc can't see)
#
# npm ci uses --ignore-scripts to skip the puppeteer postinstall (a full
# Chrome download). No CI check needs a browser; scraper tests run against
# committed fixtures.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint scripts
        run: npm run lint

      - name: Lint frontend
        run: npm run lint:src

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
