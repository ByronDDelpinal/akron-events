# CI — runs on every PR and every push to main.
#
# Six gates, in fail-fast order (cheapest first):
#   1. lint                — ESLint over scripts/ (Node scrapers + tooling)
#   2. lint:src            — ESLint over src/ (React + TypeScript)
#   3. typecheck           — tsc --noEmit  (tsconfig include is ['src'] ONLY)
#   4. typecheck:functions — deno check over supabase/functions/
#   5. test                — node --test scripts/tests/ (3,600+ assertions, fixture-based, no network)
#   6. build               — vite build (catches import/bundling breakage tsc can't see)
#
# Gate 4 exists because gate 3 cannot see the edge functions: tsc's include
# is ['src'], and the functions are Deno (remote https: imports, Deno globals)
# so tsc could not check them even if pointed at them. Until this was added,
# supabase/functions/ — the code that mails every subscriber — was checked by
# nothing, and had accumulated real type errors on main, including a silently
# dropped Reply-To header on every outbound email.
#
# npm ci uses --ignore-scripts to skip the puppeteer postinstall (a full
# Chrome download). No CI check needs a browser; scraper tests run against
# committed fixtures.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint scripts
        run: npm run lint

      - name: Lint frontend
        run: npm run lint:src

      - name: Typecheck
        run: npm run typecheck

      # Deno, not Node: the edge functions import over https: and use Deno
      # globals, so they need the Deno toolchain to typecheck at all.
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck edge functions
        run: npm run typecheck:functions

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
